<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OSINT</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="/static/css/style.css">

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<div id="title">
  <img src="/static/images/icon.jpg" style="height:24px; vertical-align:middle; margin-right:8px;">
  Japan OSINT Dashboard
</div>
<div id="map"></div>
<div id="aircraft-status" style="position:fixed; bottom:2.5%; right:10px; color:#4fc3f7; font-size:12px; z-index:1000;"></div>
<div id="log"></div>
<div id="controls">
    <button id="btn-aircraft"   onclick="toggleLayer('aircraft')"> 航空機</button>
<button id="btn-earthquake" onclick="toggleLayer('earthquake')"> 地震</button>
  <button id="btn-ship" onclick="toggleLayer('ship')"> 船舶</button>

</div>

<script src="/static/js/layers.js"></script>
<script src="/static/js/aircraft.js"></script>
<script src="/static/js/earthquake.js"></script>
<script src="/static/js/ship.js"></script>
</body>
</html>
